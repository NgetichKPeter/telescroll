<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile • Telescroll</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<header>

    <div class="logo">
        📜 Telescroll
    </div>

</header>

<main>

    <section class="card">

        <div style="text-align:center;">

            <img
                id="profile-avatar"
                src="assets/images/default-avatar.png"
                class="avatar"
                style="width:100px;height:100px;">

            <h2 id="profile-name">
                Loading...
            </h2>

            <p id="profile-username">
                @loading
            </p>

            <p id="profile-created">
                Scribing Since...
            </p>

        </div>

    </section>

    <section class="card">

        <h3>Statistics</h3>

        <p>Scripts: <span id="script-count">0</span></p>

        <p>Followers: <span id="followers-count">0</span></p>

        <p>Following: <span id="following-count">0</span></p>

        <p>Gold Received: <span id="gold-count">0</span></p>

    </section>

    <section id="profile-feed" class="feed">

    </section>

</main>

<script type="module" src="js/profile.js"></script>

</body>
</html>
