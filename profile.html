<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Scribe Profile - Telescroll">

    <title>Profile • Telescroll</title>

    <link rel="icon" href="assets/logo/favicon.ico">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<header>

    <div class="logo">
        📜 Telescroll
    </div>

    <div class="header-actions">

        <button title="Settings">
            <img src="assets/icons/settings.svg" alt="Settings" width="22">
        </button>

    </div>

</header>

<main>

    <section class="card profile-card">

        <img src="assets/images/default-cover.jpg"
             alt="Cover"
             class="profile-cover">

        <img src="assets/images/default-avatar.png"
             alt="Avatar"
             class="profile-avatar">

        <h2>Ngetich K Peter</h2>

        <p>@ngetichkpeter</p>

        <p class="profile-bio">
            Computer Scientist • Web Developer • Building Telescroll 📜
        </p>

        <p>Scribing Since: July 2026</p>

        <div class="profile-stats">

            <div>
                <strong>12</strong>
                <span>Scripts</span>
            </div>

            <div>
                <strong>245</strong>
                <span>Followers</span>
            </div>

            <div>
                <strong>180</strong>
                <span>Following</span>
            </div>

            <div>
                <strong>500</strong>
                <span>Gold</span>
            </div>

        </div>

        <button class="btn btn-primary">
            Edit Profile
        </button>

    </section>

</main>

<nav class="bottom-nav">

    <a href="index.html">
        <img src="assets/icons/archive.svg" alt="Feed">
        <span>Feed</span>
    </a>

    <a href="explore.html">
        <img src="assets/icons/explore.svg" alt="Explore">
        <span>Explore</span>
    </a>

    <a href="index.html">
        <img src="assets/icons/write-script.svg" alt="Write">
        <span>Write</span>
    </a>

    <a href="notifications.html">
        <img src="assets/icons/notifications.svg" alt="Alerts">
        <span>Alerts</span>
    </a>

    <a href="messages.html">
        <img src="assets/icons/messages.svg" alt="Messages">
        <span>Messages</span>
    </a>

    <a href="profile.html" class="active">
        <img src="assets/icons/profile.svg" alt="Profile">
        <span>Profile</span>
    </a>

</nav>

<script type="module" src="js/profile.js"></script>

</body>
</html>
