<main>

    <!-- Script Composer -->
    <section class="card script-composer">

        <textarea
            class="input"
            rows="4"
            placeholder="Write your Script here..."></textarea>

        <div class="composer-actions">

            <div class="composer-tools">

                <button title="Add Image">
                    <img src="assets/icons/image.svg" alt="Image" width="22">
                </button>

                <button title="Add Video">
                    <img src="assets/icons/video.svg" alt="Video" width="22">
                </button>

            </div>

            <button class="btn btn-primary">
                Post Script
            </button>

        </div>

    </section>

    <!-- Feed -->
    <section class="feed">

    </section>

</main>
