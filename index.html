<!-- Feed -->
<section class="feed" id="feed">

</section>

<!-- Share Menu -->
<div id="share-menu" class="hidden">

    <div class="card">

        <h3>Share Script</h3>

        <button id="share-script" class="btn btn-secondary">
            📤 Share Script
        </button>

        <button id="share-quote" class="btn btn-secondary">
            ✍️ Share with Quote
        </button>

        <button id="copy-link" class="btn btn-secondary">
            🔗 Copy Link
        </button>

        <button id="share-external" class="btn btn-secondary">
            🌍 Share Outside Telescroll
        </button>

        <button id="close-share" class="btn btn-primary">
            Cancel
        </button>

    </div>

</div>

<!-- Quote Composer -->
<div id="quote-composer" class="hidden">

    <section class="card">

        <textarea
            id="quote-text"
            class="input"
            rows="4"
            maxlength="500"
            placeholder="Write your thoughts..."></textarea>

        <div id="quoted-script">

            <!-- Original Script appears here -->

        </div>

        <br>

        <button id="post-quote" class="btn btn-primary">
            Share with Quote
        </button>

    </section>

</div>
